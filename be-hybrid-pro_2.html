<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07071a;--card:#0d0d22;--card2:#12122a;--border:rgba(255,255,255,.08);--primary:#5b8def;--pdim:rgba(91,141,239,.13);--fg:#f0f0f8;--fg2:#c8c8e0;--muted2:#9090c0;--muted:#252540;--success:#4ade80;--warn:#fbbf24;--danger:#f87171;--gold:#f59e0b;--sh:0 2px 16px rgba(0,0,0,.4)}

html,body{background:var(--bg);font-family:Inter,sans-serif;-webkit-font-smoothing:antialiased;transition:background .25s}
#root{min-height:100vh;background:var(--bg)}
.diag{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;opacity:.016}
.diag::before{content:'';position:absolute;inset:-50%;background:repeating-linear-gradient(65deg,transparent,transparent 40px,#5b8def 40px,#5b8def 41px);width:200%;height:200%}
.light .diag{display:none}
.shell{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;z-index:1}
.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:200;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.tscroll{display:flex;overflow-x:auto;scrollbar-width:none;padding:5px 8px}
.tscroll::-webkit-scrollbar{display:none}
.ttab{padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:none;border:none;color:var(--muted2);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-family:Inter,sans-serif}
.ttab.on{color:var(--primary);border-bottom-color:var(--primary)}
.screen{min-height:100vh;padding-top:38px;padding-bottom:82px}
.full{min-height:100vh;overflow-y:auto}
.fi{animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:200;background:var(--bg);border-top:1px solid var(--border);padding:7px 0 20px;display:flex;backdrop-filter:blur(20px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--muted2);font-family:Inter,sans-serif;font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 0;position:relative;transition:color .15s}
.ni.on{color:var(--primary)}
.ni.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--primary)}
.ni svg{width:18px;height:18px}
.btn{width:100%;height:52px;border:none;cursor:pointer;font-family:"Archivo Black",sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;transition:all .15s;border-radius:0}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btnp{background:var(--primary);color:#fff}
.btno{background:transparent;border:1px solid var(--border)!important;color:var(--muted2);font-family:Inter,sans-serif;font-weight:600;font-size:13px;letter-spacing:.02em;text-transform:none}
.btng{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.ibtn{width:38px;height:38px;border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;display:grid;place-items:center;border-radius:0;transition:all .15s;flex-shrink:0}

.bknow{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--primary);background:var(--pdim);color:var(--primary);font-size:9px;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .15s}

.card{background:var(--card);border:1px solid var(--border);padding:18px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.cb{border-left:3px solid var(--primary)}
.cg{border-left:3px solid var(--success)}
.cgo{border-left:3px solid var(--gold)}
.cr{border-left:3px solid var(--danger)}

.hs::-webkit-scrollbar{display:none}

.inp{width:100%;height:46px;background:var(--card);border:none;border-bottom:1px solid rgba(91,141,239,.35);color:var(--fg);font-family:Inter,sans-serif;font-size:16px;padding:0 12px;outline:none}

.ey{font-size:9px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--primary);margin-bottom:6px}
.tbtn{width:34px;height:34px;border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;display:grid;place-items:center;font-size:15px;transition:all .2s}

.loading-screen{

  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;z-index:9999;transition:opacity .5s;

  width:56px;height:56px;border:3px solid rgba(91,141,239,.2);

}
.loading-text{
  color:#5b8def;font-family:'Archivo Black',sans-serif;

}
.loading-sub{

}
</style>

function validateSchedule(schedule,days,sports){
const warnings=[];
const activeDays=days.filter(d=>schedule[d]&&schedule[d]!=='');
const sportCount={};
activeDays.forEach(d=>{const s=schedule[d];sportCount[s]=(sportCount[s]||0)+1;});
if(sportCount['musculacao']>6)warnings.push({type:'danger',msg:'Musculação 7x/semana causa sobretreino. Máximo recomendado: 5-6x com grupos diferentes.'});
const DPT_ORDER=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
let consec=0;
DPT_ORDER.forEach(d=>{const s=schedule[d];const rule=RECOVERY_RULES[s];if(s&&rule&&rule.minRest>=48){consec++;if(consec>=3){warnings.push({type:'warn',msg:`3+ dias seguidos de alta intensidade. Risco de sobretreino.`});consec=0;}}else{consec=0;}});
const restDays=days.filter(d=>!schedule[d]||schedule[d]==='').length;
if(restDays===0&&days.length===7)warnings.push({type:'danger',msg:'Nenhum dia de descanso! Pelo menos 1 dia de recuperação é essencial.'});
return warnings;
}

function getAutoSchedule(sports,days,priority){
const auto={};
const DPT_ORDER=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const activeDays=DPT_ORDER.filter(d=>days.includes(d));
const prioritySport=priority||sports[0];
const others=sports.filter(s=>s!==prioritySport);
let otherIdx=0;
activeDays.forEach((d,i)=>{if(i%2===0){auto[d]=prioritySport;}else{auto[d]=others[otherIdx%others.length]||prioritySport;otherIdx++;}});
return auto;
}

else if(dur<=45){aq=aq.slice(0,2);pr=pr.filter(e=>!e.n.toLowerCase().includes('terra')).slice(0,3);fo=fo.filter(e=>!e.n.toLowerCase().includes('terra')).slice(0,2);fi=fi.slice(0,1);const rs=ex=>({...ex,s:Math.min(ex.s||3,3)});pr=pr.map(rs);fo=fo.map(rs);}

function Coach({go}){
const [inp,setInp]=useState('');const [showBlk,setShowBlk]=useState(false);
const [mode,setMode]=useState('auto');
const [showAgents,setShowAgents]=useState(false);
const [msgs,setMsgs]=useState([{role:'ai',text:'Olá, Gabriel! Conectado ao seu perfil — Boxe, Musculação, Corrida, lesão no ombro, objetivo Performance. Como posso ajudar?',agents:[]}]);

const AGENTS={
auto:{l:'Hybrid Coach',sub:'Automático',e:'🧠',c:'var(--primary)'},
treino:{l:'Treino',sub:'Especialista',e:'🏋️',c:'var(--success)'},
lesao:{l:'Lesões',sub:'Especialista',e:'🩺',c:'var(--danger)'},
nutricao:{l:'Nutrição',sub:'Especialista',e:'🥗',c:'var(--warn)'},
progresso:{l:'Progresso',sub:'Especialista',e:'📈',c:'var(--primary)'},
planejamento:{l:'Planejamento',sub:'Especialista',e:'📅',c:'var(--gold)'},
};

function routeAgents(text){
const t=text.toLowerCase();
const hit=[];
if(/dor|dói|doendo|lesão|lesao|machuc|inflamad|inchaç/.test(t))hit.push('lesao');
if(/tempo|minutos|min\b|viajando|viagem|perdi.*treino|atrasad|reorganiz/.test(t))hit.push('planejamento');
if(/proteína|proteina|caloria|macro|dieta|comer|nutri|suplement/.test(t))hit.push('nutricao');
if(/estagn|evolu|progress|platô|plato|carga|recorde|pr\b/.test(t))hit.push('progresso');
if(hit.length===0||/treino|exercíc|exercic|série|serie|repetiç|repetic/.test(t))hit.push('treino');
return [...new Set(hit)];
}

function genReply(text,agentsHit){
const lower=text.toLowerCase();
if(agentsHit.includes('lesao')&&/ombro/.test(lower)){
return '🩺 Entendido — vou priorizar a segurança do seu ombro. Substituí exercícios de empurrar (supino, desenvolvimento) por puxadas e remadas, que não sobrecarregam a articulação. Se a dor persistir por mais de 3 dias mesmo em repouso, procure um ortopedista.';
}
if(agentsHit.includes('planejamento')&&/tempo|minutos|min\b/.test(lower)){
return '📅 Sem problema! Reorganizei seu treino de hoje para uma versão de 20 minutos focada nos exercícios de maior impacto, mantendo a prioridade no Boxe. Os exercícios acessórios ficam para amanhã.';
}
if(agentsHit.includes('nutricao')){
return '🥗 Com seu peso (80kg) e objetivo de performance, a recomendação geral é de 1.6 a 2.0g de proteína por kg de peso corporal — entre 128g e 160g por dia, distribuídos nas refeições. (Módulo completo de nutrição chega em breve.)';
}
if(agentsHit.includes('progresso')){
return '📈 Analisando seu histórico: você vem subindo carga consistentemente nas últimas 3 semanas. Se sentir estagnação, pode ser hora de variar o estímulo — trocar o ângulo do exercício ou ajustar o volume.';
}
return '🏋️ Beleza! Vou ajustar isso no seu plano de treino considerando sua prioridade em Boxe e seu nível atual. Qualquer ajuste fica refletido já no seu próximo treino.';
}

function send(text){
if(!text.trim())return;
const agentsHit=mode==='auto'?routeAgents(text):[mode];
const reply=genReply(text,agentsHit);
setMsgs(m=>[...m,{role:'user',text},{role:'ai',text:reply,agents:mode==='auto'?agentsHit:[]}]);
setInp('');
}

return <div className="screen fi" style={{display:'flex',flexDirection:'column'}}>

<button className="ibtn" onClick={()=>go('home')}><I.L s={18}/></button>

<div style={{display:'flex',alignItems:'center',gap:8}}>

<span className="pro">PRO</span>
</div>

</div>

</div>}
<div style={{padding:'8px 20px',background:'rgba(91,141,239,.04)',borderBottom:'1px solid var(--border)'}}>
<p className="st" style={{marginBottom:6}}>CONTEXTO CARREGADO</p>
<div className="hs">{['🥊 Boxe (Int.)','🏋️ Musculação (Av.)','⚡ Performance','⚠️ Ombro D.','80kg · 178cm'].map(tag=><span key={tag} style={{background:'var(--card)',border:'1px solid var(--border)',padding:'3px 8px',fontSize:9,fontWeight:600,color:'var(--muted2)',whiteSpace:'nowrap',flexShrink:0}}>{tag}</span>)}</div>
</div>

<div style={{background:m.role==='ai'?'var(--card)':'var(--pdim)',border:'1px solid var(--border)',borderLeft:m.role==='ai'?'2px solid var(--primary)':'2px solid var(--success)',padding:'11px 14px',fontSize:13,lineHeight:1.6,color:'var(--fg)',marginLeft:m.role==='user'?30:0,marginRight:m.role==='ai'?0:0}}>

</div>)}
{msgs.length<=1&&<>
<p className="st" style={{marginBottom:8}}>SUGESTÕES</p>
{['O que treino hoje?','Meu ombro está doendo — adapta meu treino','Sem tempo — treino de 20 min','Como evoluir mais no Boxe?'].map(sug=>(
<div key={sug} onClick={()=>send(sug)} style={{background:'var(--card2)',border:'1px solid var(--border)',padding:'10px 14px',cursor:'pointer',marginBottom:6,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
<span style={{fontSize:11,color:'var(--muted2)'}}>{sug}</span><span style={{color:'var(--primary)',fontSize:14}}>→</span>
</div>))}
</>}
</div>
<div style={{padding:'12px 20px 28px',borderTop:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center'}}>
<input style={{flex:1,height:48,background:'var(--card)',border:'none',borderBottom:'1px solid rgba(91,141,239,.3)',color:'var(--fg)',fontFamily:'Inter',fontSize:13,padding:'0 14px',outline:'none'}} placeholder="Pergunte ao seu treinador IA..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send(inp)}/>
<button onClick={()=>send(inp)} style={{width:48,height:48,background:'var(--primary)',border:'none',display:'grid',placeItems:'center',cursor:'pointer',flexShrink:0,opacity:inp.trim()?1:.3}}>

</button>
</div>
{showAgents&&<div className="overlay" onClick={()=>setShowAgents(false)}>
<div className="sheet" onClick={e=>e.stopPropagation()}>
<div style={{textAlign:'center',marginBottom:16}}>
<p className="ey">MODO ESPECIALISTAS</p>
<h2 style={{fontSize:18,color:'var(--fg)',fontFamily:'"Archivo Black",sans-serif'}}>FALE DIRETO COM UM AGENTE</h2>
</div>
<div style={{display:'flex',flexDirection:'column',gap:8}}>
{Object.entries(AGENTS).map(([key,a])=>(
<button key={key} onClick={()=>{setMode(key);setShowAgents(false);}} style={{background:mode===key?`${a.c}15`:'var(--card2)',border:`1px solid ${mode===key?a.c:'var(--border)'}`,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left'}}>
<span style={{fontSize:22}}>{a.e}</span>
<div style={{flex:1}}>

</div>
{mode===key&&<span style={{color:a.c,fontSize:16}}>✓</span>}
</button>
))}
</div>
<button className="btn btno" style={{marginTop:14}} onClick={()=>setShowAgents(false)}>FECHAR</button>
</div>
</div>}
{showBlk&&<div className="overlay" onClick={()=>setShowBlk(false)}>
<div className="sheet" onClick={e=>e.stopPropagation()} style={{borderTopColor:'var(--gold)'}}>
<div style={{textAlign:'center',padding:'8px 0 16px'}}>
<div style={{fontSize:44,marginBottom:12}}>🤖</div>
<p className="ey" style={{color:'var(--gold)'}}>HYBRID COACH</p>
<h2 style={{fontSize:20,color:'var(--fg)',fontFamily:'"Archivo Black",sans-serif',marginBottom:10}}>SEU TREINADOR<br/>ESTÁ PRONTO</h2>
<p style={{fontSize:12,color:'var(--muted2)',lineHeight:1.7}}>Assine o Plano PRO para desbloquear.</p>
</div>

{['Treinos adaptados diariamente','Ajustes conforme suas lesões','Planejamento 100% personalizado','Respostas sobre sua evolução','Acompanhamento 24h'].map((b,i,arr)=><div key={b} style={{fontSize:12,color:'var(--fg)',display:'flex',alignItems:'center',gap:10,padding:'10px 16px',borderBottom:i<arr.length-1?'1px solid var(--border)':'none'}}><span style={{color:'var(--success)',fontWeight:700,flexShrink:0}}>✓</span>{b}</div>)}

<button className="btn btng" style={{marginBottom:8}} onClick={()=>{setShowBlk(false);go('pro');}}>⚡ ASSINAR PLANO PRO</button>

const SL=[{id:'splash',l:'Splash'},{id:'auth',l:'Login'},{id:'onboarding',l:'Onboarding'},{id:'home',l:'Home'},{id:'workout',l:'Treino'},{id:'stats',l:'Stats'},{id:'coach',l:'Hybrid Coach'},{id:'profile',l:'Perfil'},{id:'pro',l:'Plano PRO'},{id:'social',l:'Amigos'},{id:'notifications',l:'Notificações'},{id:'terms',l:'Termos'},{id:'privacy',l:'Privacidade'}];

class ErrorBoundary extends React.Component{
constructor(props){super(props);this.state={hasError:false};}
static getDerivedStateFromError(){return{hasError:true};}
componentDidCatch(err){console.error('Screen error:',err);}
render(){
if(this.state.hasError){return <div style={{padding:20,background:'var(--bg)',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
<div style={{fontSize:48}}>⚠️</div>
<p style={{color:'var(--fg)',fontFamily:'"Archivo Black",sans-serif',fontSize:16,textAlign:'center'}}>ERRO NESSA TELA</p>
<button onClick={()=>this.setState({hasError:false})} style={{padding:'12px 24px',background:'var(--primary)',border:'none',color:'#fff',fontFamily:'"Archivo Black",sans-serif',fontSize:11,cursor:'pointer'}}>VOLTAR</button>
</div>;}
return this.props.children;}}

function App(){
const [screen,setScreen]=useState('splash');
const [dark,setDark]=useState(true);
function go(s){setScreen(s);window.scrollTo(0,0);}
useEffect(()=>{document.body.className=dark?'':'light';document.getElementById('root').className=dark?'':'light';},[dark]);
useEffect(()=>{try{scheduleAdaptiveNotifications();}catch(e){}},[]);
function getScreen(){
switch(screen){
case 'auth':return <Auth go={go}/>;
case 'onboarding':return <Onboarding go={go}/>;
case 'home':return <Home go={go} dark={dark} setDark={setDark}/>;
case 'workout':return <Workout go={go}/>;
case 'report':return <Report go={go}/>;
case 'stats':return <Stats go={go}/>;
case 'coach':return <Coach go={go}/>;
case 'banco':return <Banco go={go}/>;
case 'calendar':return <Calendar go={go}/>;
case 'profile':return <Profile go={go}/>;
case 'social':return <Social go={go}/>;
case 'notifications':return <NotificationSettings go={go}/>;
case 'pro':return <Pro go={go}/>;
case 'social':return <Social go={go}/>;
case 'notifications':return <NotificationSettings go={go}/>;
case 'terms':return <Terms go={go}/>;
case 'privacy':return <Privacy go={go}/>;
default:return <Splash go={go} dark={dark} setDark={setDark}/>;}}
return <>
<nav className="topbar">
<div className="tscroll">{SL.map(s=><button key={s.id} className={`ttab${screen===s.id?' on':''}`} onClick={()=>go(s.id)}>{s.l}</button>)}</div>
</nav>
<div className="shell"><ErrorBoundary key={screen}>{getScreen()}</ErrorBoundary></div>
</>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
